<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kyugard — Curso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/site.css" />
</head>
<body data-page="modules">
  <main class="page">

    <section class="hero">
      <header class="header">
        <a href="./index.html" class="logo-link">
          <img src="./assets/logo.png" alt="Kyugard" class="logo" />
        </a>

        <nav class="top-nav">
          <a href="./index.html" class="nav-link" data-i18n="navHome">Home</a>
          <a href="./info.html" class="nav-link" data-i18n="navInfo">Info</a>
          <button id="lang-btn" class="lang-btn" type="button">English</button>
        </nav>
      </header>

      <div class="hero-content">
        <h1 class="hero-title" data-i18n="modulesHeroTitle"></h1>
        <p class="hero-subtitle" data-i18n="modulesHeroSub"></p>
      </div>
    </section>

    <section class="content">
      <article class="card">
        <div class="card-inner">
          <div class="dot"></div>
          <div class="card-text">
            <p class="card-main" data-i18n="modulesIntro1"></p>
            <p class="card-sub" data-i18n="modulesIntro2"></p>
          </div>
        </div>
      </article>

      <article class="card">
        <div class="card-inner">
          <div class="dot"></div>
          <div class="card-text">
            <p class="card-main" data-i18n="module1Title"></p>
            <p class="card-sub" data-i18n="module1Text"></p>
            <button class="card-button" type="button" data-i18n="openModule"></button>
          </div>
        </div>
      </article>

      <article class="card">
        <div class="card-inner">
          <div class="dot"></div>
          <div class="card-text">
            <p class="card-main" data-i18n="module2Title"></p>
            <p class="card-sub" data-i18n="module2Text"></p>
            <button class="card-button" type="button" data-i18n="openModule"></button>
          </div>
        </div>
      </article>

      <article class="card">
        <div class="card-inner">
          <div class="dot"></div>
          <div class="card-text">
            <p class="card-main" data-i18n="module3Title"></p>
            <p class="card-sub" data-i18n="module3Text"></p>
            <button class="card-button" type="button" data-i18n="openModule"></button>
          </div>
        </div>
      </article>

      <article class="card">
        <div class="card-inner">
          <div class="dot"></div>
          <div class="card-text">
            <p class="card-main" data-i18n="module4Title"></p>
            <p class="card-sub" data-i18n="module4Text"></p>
            <button class="card-button" type="button" data-i18n="openModule"></button>
          </div>
        </div>
      </article>

      <article class="card">
        <div class="card-inner">
          <div class="dot"></div>
          <div class="card-text">
            <p class="card-main" data-i18n="module5Title"></p>
            <p class="card-sub" data-i18n="module5Text"></p>
            <button class="card-button" type="button" data-i18n="openModule"></button>
          </div>
        </div>
      </article>
    </section>

    <footer class="footer">
      <p>© Kyugard 2026</p>
    </footer>
  </main>

  <script src="./js/site.js"></script>
</body>
</html>
