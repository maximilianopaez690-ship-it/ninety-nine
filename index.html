<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kyugard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background: #000;
      color: white;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
    }

    .logo {
      height: 40px;
    }

    .nav {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .btn {
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid white;
      background: transparent;
      color: white;
      cursor: pointer;
    }

    .hero {
      text-align: center;
      margin-top: 100px;
      padding: 20px;
    }

    .hero h1 {
      font-size: 50px;
      margin: 20px 0;
    }

    .hero p {
      font-size: 18px;
      opacity: 0.8;
    }

    .start {
      margin-top: 30px;
      padding: 12px 25px;
      border-radius: 10px;
      background: white;
      color: black;
      font-weight: bold;
      display: inline-block;
    }
  </style>
</head>

<body>

<header class="header">
  <img src="./assets/logo.png" class="logo">

  <div class="nav">
    <a href="./info.html">Info</a>
    <button class="btn" onclick="toggleLang()">English</button>
  </div>
</header>

<section class="hero">
  <p id="kicker">Cada época tiene su revolución.<br>Esta es la nuestra.</p>
  <h1>Kyugard.</h1>
  <p id="sub">Una revolución del pensamiento.</p>

  <a href="./modules.html" class="start" id="startBtn">Comenzar</a>
</section>

<script>
let lang = localStorage.getItem("lang") || "es";

function applyLang() {
  if (lang === "en") {
    document.getElementById("kicker").innerHTML = "Every era has its revolution.<br>This is ours.";
    document.getElementById("sub").innerText = "A revolution of thought.";
    document.getElementById("startBtn").innerText = "Start";
  } else {
    document.getElementById("kicker").innerHTML = "Cada época tiene su revolución.<br>Esta es la nuestra.";
    document.getElementById("sub").innerText = "Una revolución del pensamiento.";
    document.getElementById("startBtn").innerText = "Comenzar";
  }
}

function toggleLang() {
  lang = lang === "es" ? "en" : "es";
  localStorage.setItem("lang", lang);
  applyLang();
}

applyLang();
</script>

</body>
</html>
