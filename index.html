<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Kyugard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background-color: #f4f8fc;
      color: #1c2b3a;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      padding: 20px 40px;
      background: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #e0e6ed;
    }

    .logo {
      font-size: 22px;
      font-weight: 600;
      color: #0d3b66;
    }

    .hero {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 60px 20px;
    }

    .hero h1 {
      font-size: 42px;
      font-weight: 600;
      color: #0d3b66;
    }

    .hero p {
      margin-top: 20px;
      font-size: 18px;
      color: #3a4a5a;
      max-width: 600px;
    }

    footer {
      padding: 60px 20px;
      text-align: center;
      background: white;
      border-top: 1px solid #e0e6ed;
    }

    .manifesto {
      font-size: 20px;
      line-height: 1.8;
      color: #1c2b3a;
      margin-bottom: 20px;
    }

    .author {
      font-size: 16px;
      color: #0d3b66;
      font-style: italic;
    }
  </style>
</head>

<body>

  <header>
    <div class="logo">Kyugard</div>
  </header>

  <section class="hero">
    <div>
      <h1>Democracia Directa Voluntaria</h1>
      <p>Un espacio para pensar, aprender y construir una comunidad descentralizada.</p>
    </div>
  </section>

  <footer>
    <div class="manifesto">
      Al final, Kyugard será una comunidad descentralizada.<br>
      Por eso, no espero que seamos muchos.<br>
      Espero que seamos todos.
    </div>
    <div class="author">
      — Adrien Polito
    </div>
  </footer>

</body>
</html>
