<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kyugard</title>

  <link rel="stylesheet" href="./css/styles.css">
</head>

<body>

  <!-- HERO -->
  <section class="hero">

    <header class="header">
      <div class="logo">
        <a href="./index.html">
          <img src="./assets/logo.png" alt="Kyugard">
        </a>
      </div>

      <div class="nav">
        <a href="./info.html">Info</a>
        <button onclick="toggleLanguage()" id="lang-btn">English</button>
      </div>
    </header>

    <div class="hero-content">
      <h1 data-i18n="hero">
        Bienvenidos a Kyugard.<br>
        Una revolución del pensamiento.
      </h1>

      <button class="cta-btn" onclick="goCourse()" data-i18n="start">
        Comenzar
      </button>
    </div>

  </section>

  <!-- CONTENIDO -->
  <section class="content">

    <div class="block">
      <p data-i18n="puente"></p>
    </div>

    <div class="block">
      <p data-i18n="explicacion"></p>
    </div>

    <div class="block">
      <p data-i18n="sistema"></p>
    </div>

    <div class="block">
      <p data-i18n="curso"></p>
      <button class="btn-primary" onclick="goCourse()" data-i18n="start"></button>
    </div>

    <div class="block">
      <p data-i18n="cierre"></p>
      <a href="https://patreon.com" target="_blank" class="btn-secondary">
        Patreon
      </a>
    </div>

  </section>

  <script src="./js/app.js"></script>

</body>

</html>
