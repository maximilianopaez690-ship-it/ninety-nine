<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kyugard</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>

<main>

  <!-- HERO -->
  <section class="hero">
    <header class="header">
      <img src="./assets/logo.png" class="logo">

      <div class="nav">
        <a href="./idea.html">Info</a>
        <button id="lang-btn">English</button>
      </div>
    </header>

    <div class="hero-content">
      <p data-i18n="heroKicker"></p>
      <h1 data-i18n="heroTitle"></h1>
      <p data-i18n="heroSubtitle"></p>

      <a href="./modules.html" class="btn" data-i18n="start"></a>
    </div>
  </section>

  <!-- CONTENT -->
  <section class="content">

    <div class="card">
      <div class="dot"></div>
      <div>
        <p data-i18n="block1"></p>
        <p data-i18n="block2"></p>
      </div>
    </div>

    <div class="card big">
      <div class="dot"></div>
      <div>
        <p data-i18n="m1"></p>
        <p data-i18n="m2"></p>
        <p class="strong" data-i18n="m3"></p>
        <p data-i18n="m4"></p>
        <p data-i18n="m5"></p>
        <p data-i18n="m6"></p>
        <p class="break" data-i18n="m7"></p>
        <p data-i18n="m8"></p>
        <p data-i18n="m9"></p>
        <p data-i18n="m10"></p>
        <p data-i18n="m11"></p>
      </div>
    </div>

    <div class="card">
      <div class="dot"></div>
      <div>
        <p data-i18n="idea1"></p>
        <p data-i18n="idea2"></p>
        <p class="strong" data-i18n="idea3"></p>
        <p class="break" data-i18n="idea4"></p>
        <p data-i18n="idea5"></p>
      </div>
    </div>

    <div class="card with-icon">
      <div class="dot"></div>

      <div>
        <p data-i18n="course1"></p>
        <p data-i18n="course2"></p>

        <a href="./modules.html" class="btn" data-i18n="start"></a>
      </div>

      <img src="./assets/ballot-box.png" class="icon">
    </div>

    <div class="card">
      <div class="dot"></div>
      <div>
        <p data-i18n="wake1"></p>
        <p data-i18n="wake2"></p>
      </div>
    </div>

    <div class="card with-icon">
      <div class="dot"></div>

      <div>
        <p data-i18n="support1"></p>
        <p data-i18n="support2"></p>

        <a href="#" class="btn" data-i18n="patreon"></a>
      </div>

      <img src="./assets/handshake.png" class="icon">
    </div>

  </section>

  <footer>© Kyugard 2026</footer>

</main>

<script src="./js/app.js"></script>

</body>
</html>
