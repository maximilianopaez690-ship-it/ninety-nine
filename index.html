<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kyugard</title>

  <!-- Tipografía -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>

<main class="page">

  <!-- HERO -->
  <section class="hero">

    <header class="header">
      <img src="./assets/logo.png" class="logo">

      <div class="nav">
        <a href="./idea.html">Info</a>
        <button id="lang-btn">English</button>
      </div>
    </header>

    <div class="hero-content">
      <h1 data-i18n="heroLine1">Bienvenidos a Kyugard.</h1>
      <p data-i18n="heroLine2">Una revolución del pensamiento.</p>

      <a href="./modules.html" class="cta" data-i18n="start">
        Comenzar
      </a>
    </div>

  </section>

  <!-- CONTENIDO -->
  <section class="content">

    <!-- FRASE PUENTE -->
    <div class="card">
      <div class="dot"></div>

      <div>
        <p class="main" data-i18n="bridgeMain"></p>
        <p class="sub" data-i18n="bridgeSub"></p>
      </div>
    </div>

    <!-- MANIFIESTO -->
    <div class="card big">
      <div class="dot"></div>

      <div>
        <p class="main" data-i18n="manifestLine1"></p>
        <p class="sub" data-i18n="manifestLine2"></p>

        <p class="emphasis" data-i18n="manifestLine3"></p>

        <p class="sub" data-i18n="manifestLine4"></p>
        <p class="sub" data-i18n="manifestLine5"></p>

        <p class="break" data-i18n="manifestLine6"></p>

        <p class="sub" data-i18n="manifestLine7"></p>
        <p class="sub" data-i18n="manifestLine8"></p>
        <p class="sub" data-i18n="manifestLine9"></p>

        <p class="sub last" data-i18n="manifestLine10"></p>
      </div>
    </div>

    <!-- CURSO -->
    <div class="card">
      <div class="dot"></div>

      <div>
        <p class="main" data-i18n="courseMain"></p>
        <p class="sub" data-i18n="courseSub"></p>

        <a href="./modules.html" class="button" data-i18n="start"></a>
      </div>
    </div>

    <!-- PATREON -->
    <div class="card">
      <div class="dot"></div>

      <div>
        <p class="main" data-i18n="supportMain"></p>
        <p class="sub" data-i18n="supportSub"></p>

        <a href="https://www.patreon.com/" class="button" data-i18n="patreon"></a>
      </div>
    </div>

  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <p>© Kyugard 2026</p>
  </footer>

</main>

<script src="./js/app.js"></script>

</body>
</html>
